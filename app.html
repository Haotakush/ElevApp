<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#E8983E">
  <!-- Content Security Policy — protège contre les injections XSS -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://www.gstatic.com https://cdnjs.cloudflare.com https://apis.google.com 'unsafe-inline';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: blob: https://*.googleusercontent.com https://lh3.googleusercontent.com;
    connect-src 'self'
      https://*.googleapis.com
      https://*.firebaseio.com
      wss://*.firebaseio.com
      https://*.firebasestorage.app
      https://identitytoolkit.googleapis.com
      https://securetoken.googleapis.com
      https://accounts.google.com;
    frame-src https://elevapp-6582c.firebaseapp.com https://accounts.google.com https://elevapp-6582c.firebaseapp.com;
    object-src 'none';
    base-uri 'self';
  ">
  <meta name="description" content="ElevApp — Gestion d'élevage canin et félin conforme à l'arrêté du 19 juin 2025">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>ElevApp — Gestion d'Élevage</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="img/icons/icon-192.png">
  <link rel="apple-touch-icon" href="img/icons/icon-192.png">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header id="app-header" style="display:none;">
    <div class="header-logo">
      <span class="logo-icon">🐾</span>
      <span>ElevApp</span>
    </div>
    <div class="header-right">
      <div class="offline-indicator" id="offline-indicator">
        <span>⚡</span> Hors-ligne
      </div>
      <button class="header-profile-btn" id="profile-btn" title="Profil"></button>
    </div>
    <!-- Profile Dropdown -->
    <div class="profile-dropdown" id="profile-dropdown">
      <button class="profile-dropdown-item" data-action="profile">
        <span>👤</span> Mon profil
      </button>
      <button class="profile-dropdown-item" data-action="aide">
        <span>❓</span> Aide & Guide
      </button>
      <button class="profile-dropdown-item" data-action="dark-mode">
        <span>🌙</span> Mode sombre
      </button>
      <a href="mailto:contact@elevapp.fr" class="profile-dropdown-item" style="display:flex;align-items:center;gap:8px;text-decoration:none;color:inherit;">
        <span>💬</span> Contact & Support
      </a>
      <button class="profile-dropdown-item" data-action="legal">
        <span>📜</span> Mentions légales
      </button>
      <button class="profile-dropdown-item danger" data-action="logout">
        <span>🚪</span> Déconnexion
      </button>
    </div>
  </header>

  <!-- ===== SYNC BADGE ===== -->
  <div class="sync-badge" id="sync-badge">
    🔄 <span id="sync-count">0</span> en attente
  </div>

  <!-- ===== MAIN CONTENT ===== -->
  <main id="app-content">
    <!-- Pages are injected here dynamically -->
  </main>

  <!-- ===== BOTTOM NAV ===== -->
  <nav id="app-nav" style="display:none;">
    <button class="nav-item active" data-page="dashboard">
      <span class="nav-icon">🏠</span>
      <span>Accueil</span>
    </button>
    <button class="nav-item" data-page="animals">
      <span class="nav-icon">🐾</span>
      <span>Animaux</span>
    </button>
    <button class="nav-item" data-page="portees">
      <span class="nav-icon">🍼</span>
      <span>Portées</span>
    </button>
    <button class="nav-item" data-page="conformite">
      <span class="nav-icon">🔬</span>
      <span>Repro</span>
    </button>
    <button class="nav-item" data-page="more" id="nav-more-btn">
      <span class="nav-icon">☰</span>
      <span>Plus</span>
    </button>
  </nav>

  <!-- ===== MENU "PLUS" ===== -->
  <div class="more-menu-overlay" id="more-menu-overlay" style="display:none;">
    <div class="more-menu" id="more-menu">
      <div class="more-menu-title">Outils</div>
      <button class="more-menu-item" data-page="health">
        <span>📋</span> Journal sanitaire
      </button>
      <button class="more-menu-item" data-page="calendrier">
        <span>📅</span> Calendrier
      </button>
      <button class="more-menu-item" data-page="exports">
        <span>📊</span> Exports PDF
      </button>
      <button class="more-menu-item" data-page="registre">
        <span>📒</span> Registre E/S
      </button>
      <button class="more-menu-item" data-page="autocontrole">
        <span>🔍</span> Autocontrôles
      </button>
      <button class="more-menu-item" data-page="cession-form">
        <span>📜</span> Certificat de cession
      </button>
      <button class="more-menu-item" data-page="aide">
        <span>❓</span> Aide & Guide
      </button>
    </div>
  </div>

  <!-- ===== FAB ===== -->
  <button class="fab" id="fab-btn" style="display:none;" title="Ajouter">+</button>

  <!-- ===== TOAST CONTAINER ===== -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ===== MODAL OVERLAY ===== -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-content">
      <div class="modal-handle"></div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- ===== FIREBASE SDK ===== -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <!-- ===== jsPDF ===== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- ===== APP MODULES ===== -->
  <script src="js/appcache.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/db.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/animals.js"></script>
  <script src="js/health.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/exports.js"></script>
  <script src="js/cession.js"></script>
  <script src="js/registre.js"></script>
  <script src="js/autocontrole.js"></script>
  <script src="js/changelog.js"></script>
  <script src="js/externes.js"></script>
  <script src="js/portees.js"></script>
  <script src="js/conformite.js"></script>
  <script src="js/chaleurs.js"></script>
  <script src="js/ics.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/calendrier.js"></script>
  <script src="js/legal.js"></script>
  <script src="js/onboarding.js"></script>
  <script src="js/aide.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
